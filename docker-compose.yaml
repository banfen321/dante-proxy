services:
  dante:
    build: .
    image: banfen321/dante-proxy:latest
    restart: unless-stopped
    network_mode: host
    environment:
      SOCKD_PORT:           ${SOCKD_PORT:-1080}
      SOCKD_BIND_ADDR:      ${SOCKD_BIND_ADDR:-0.0.0.0}
      SOCKD_ALLOW_IPS:      ${SOCKD_ALLOW_IPS:-0.0.0.0/0}
      SOCKD_USER_NAME:      ${SOCKD_USER_NAME:-proxy}
      SOCKD_USER_PASSWORD:  ${SOCKD_USER_PASSWORD:-}
      SOCKD_EXTERNAL_IFACE: ${SOCKD_EXTERNAL_IFACE:-}
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true

  # TLS mode (stunnel wraps Dante in TLS).
  # Enable with:  docker compose --profile tls up -d
  # Also set in .env:  SOCKD_BIND_ADDR=127.0.0.1  SOCKD_PORT=1081  STUNNEL_PORT=1080
  stunnel:
    build: stunnel/
    restart: unless-stopped
    network_mode: host
    volumes:
      - stunnel-certs:/etc/stunnel/certs
    environment:
      STUNNEL_PORT: ${STUNNEL_PORT:-1080}
      SOCKD_PORT:   ${SOCKD_PORT:-1081}
    profiles: [tls]

volumes:
  stunnel-certs:
